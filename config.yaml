params:
  title: "Rajat Agrawal"
  description: Text about my cool site
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    defaultTheme: "dark" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # color:
  #   textColor:
  #   secondaryTextColor:
  #   backgroundColor:
  #   secondaryBackgroundColor:
  #   primaryColor:
  #   secondaryColor:

  #   darkmode:
  #     textColor:
  #     secondaryTextColor:
  #     backgroundColor:
  #     secondaryBackgroundColor:
  #     primaryColor:
  #     secondaryColor:

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Rajat Agrawal" # Brand name for the brand | default is the title variable
    disableSearch: true
    # searchPlaceholder: "Search"
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Rajat Agrawal."
    subtitle: "I build dreams into reality"
    content: "Innovative mechanical design engineer who brings ideas to life through cutting-edge technology and precision engineering, ensuring functionality, efficiency, and excellence."
    image: /images/PHOTO.jpg
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "/images/resume.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://example.com
        - icon: fab fa-linkedin
          url: https://example.com
      # customIcons:
      #   - icon: /fav.png
      #     url: "https://example.com"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/rajat.jpg"
    content: |-
      Multidisciplinary engineer with a strong analytical aptitude, I am seeking a challenging position in a researchintensive environment where I can apply my knowledge and expertise. Through my academic pursuits and
      professional engagements, I have gained extensive theoretical and practical exposure to various aspects of
      mechanical engineering, including production, manufacturing, and product design. I possess exceptional
      communication skills, which enable me to collaborate effectively with colleagues from diverse backgrounds
      and work towards advancing scientific understanding and finding innovative solutions to real-world problems.
    skills:
      enable: false
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Industrial Software Skills: PTC Creo, SolidWorks, AutoCAD Mechanical, Ansys Mechanical, MathCAD,
Robot Operating Systems (ROS), ArduPilot, PX4, MS Office products."
        - "CSS"
        - "JavaScript"
        - "React"
        - "Node"
        - "Express"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - job: "Project Associate–I"
        company: "IISER Bhopal"
        companyUrl: "https://example.com"
        date: "Aug 2021 - present - Bhopal India"
        featuredLink:
          enable: true
          name: "Project Associate–I"
          url: "https://example.com"
        content: |
          - Currently working on a SERB-funded project titled "Design and Development of Autonomous Surface
          Vehicle for Bathymetry Applications" under the guidance of Dr. Sujit P.B.
          - Designing and developing an autonomous electric rickshaw for sustainable and eco-friendly transportation
          in urban India.
          - Working with the Central Institute of Agriculture Engineering (CIAE) to create an Autonomous Weeder
          that uses AI, sensors, and cameras to detect and remove weeds from crops without damaging them, by
          employing advanced algorithms and precision tools.
          - Designed and manufactured precise wafer probes for micro-level examination of flexible integrated circuits
          with minimal negative impact on the device under test (DUT) by utilizing 3D printing, tungsten pins, and
          a customized mechanical structure.
          - Set-up an agile and low-cost indoor autonomous swarm test-bed with multiple quad-copters to facilitate
          the testing of algorithms for autonomous guidance strategies.
          - Built and improved an autonomous off-road rover named ’Hound’ by establishing electrical connections,
          addressing mechanical issues, and integrating computer vision sensors.

      - job: "Project Associate–I"
        company: "IISER Bhopal"
        companyUrl: "https://example.com"
        date: "Dec 2020–April 2021 - Bhopal India"
        featuredLink:
          enable: true
          name: "Project Associate–I"
          url: "https://example.com"
        content: |
          - Prototyped a portable low-cost Oxygen Concentrator device as a part of IISER Bhopal’s efforts towards
          handling COVID-19.
          - 3D model optimization and slicing for 3D print production with 3D printer hardware including FDM, SLA
          technologies.

      - job: "Contract Design Engineer"
        company: "Bharat Heavy Electricals Ltd"
        companyUrl: "https://example.com"
        date: "December 2019–December 2020 March 2019–May 2019 - Haridwar India"
        featuredLink:
          enable: true
          name: "Project Associate–Isss"
          url: "https://example.com"
        content: |
          Worked in association with the Indian Mission Project of "Advanced Ultra Supercritical (AUSC) 800MW
          Steam Turbine" in the Research and Development group of Steam Turbine Engineering (STE) Department.

          - Carried out Fatigue Analysis (Low Cycle Fatigue) of High Pressure (HP) turbine based on Alloy 625 and
          GX12 Materials with operating Parameters of 710◦C Temp. and 300 Bar Pressure in Ansys Mechanical.
          - Created the Dimensional Drawings, Main Assembly Drawing, Part Drawings and the complete Bill of
          Materials for Turbine Casings, Pedestals and its assembly components in PTC Creo as well as in
          Autodesk AutoCAD.
          - Designed 3D CAD digitization of Turbine Casings, Bearings, Pedestals and its assembly components.
          - Carried out Tolerance Analysis of HP turbine Inlet Connection in Ansys Mechanical.

      - job: "Graduate Apprentice Trainee"
        company: "Bharat Heavy Electricals Ltd"
        companyUrl: "https://example.com"
        date: "March 2018–Feb 2019 - Haridwar India"
        featuredLink:
          enable: true
          name: "Project Associate–I"
          url: "https://example.com"
        content: |
          Underwent Apprenticeship Training for one year where I was associated with Indian Mission Project of
          "Advanced Ultra Supercritical (AUSC) 800MW Steam Turbine" in Research and Development group of Steam
          Turbine Engineering (STE) Department.
          - Carried out Coupled Structural and Thermal FEA in Steady-State and Transient Conditions on Turbine
          Equipment’s such as Inner Casing, IP Inlet Connections etc. and to optimize the generated results.
          - Managed all phases of the design process for a multitude of products, components, parts, assemblies and
          sub-assemblies, including drafting, dimensioning, tolerance, prototyping and documenting results.

      - job: "Site Engineer"
        company: "Vivetto Systems Pvt Ltd"
        companyUrl: "https://example.com"
        date: "June 2017 - Nov 2019 - Mandsaur Madhya Pradesh India"
        featuredLink:
          enable: true
          url: "https://example.com"
        content: |
          Wad worked with Vivetto Systems Private Limited, Gurgaon as a Site Engineer at NTPC’s 250 MW Solar
