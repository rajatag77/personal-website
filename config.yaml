  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: "B.Tech Project: Analysis of Advance Aerodynamics Changes (GENERIC BUMP) in Aerospace Industry
        Using CFD"
        content: I was part of a team whose aim was to investigate the effects of generic bump in a fighter aircraft and
          its application as a boundary layer diverter (BLD) and compression surface for a Diverterless Supersonic
          Inlet (DSI). The task was to divert as much of the boundary layer as possible or prevent the boundary
          layer from entering the inlet of an aircraft by using generic bumps. Properties such as pressure recovery,
          boundary layer diversion, surface flow, change in Mach number and mass flow are the major parameters
          that are being analysed.
        image: /images/projects/profile.png
        featured:
          name: Demo
          link: https://hugo-profile.netlify.app
